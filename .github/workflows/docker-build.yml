# ============================================
# CI/CD — Build, Push & Deploy (GitOps)
# ============================================
# On push to main:
#   1. Builds Docker image (Vite + Nginx)
#   2. Pushes to GHCR
#   3. Updates image tag in kynsoft-gitops
#   4. ArgoCD syncs the cluster automatically
# ============================================

name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/smartpayut-admin-dev
  GITOPS_DEPLOY_FILE: environments/dev/smartpayut-dev/deployments/smartpayut-admin.yaml

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: kmontes198910/kynsoft-gitops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          ref: main

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            ${{ env.GITOPS_DEPLOY_FILE }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_DEPLOY_FILE }}
          git diff --cached --quiet || git commit -m "deploy(smartpayut-admin): update image to ${{ github.sha }}"
          git pull --rebase
          git push

  cleanup-images:
    name: Cleanup Old Images
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      packages: write
    steps:
      - name: Delete old image versions (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: smartpayut-admin-dev
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
